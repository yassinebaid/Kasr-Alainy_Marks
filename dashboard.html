<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <img src="Photo/IMG_6261 (Edited).png" alt="University Logo" class="topbar-logo">
        <span class="topbar-title">Students</span>
        <div class="header-icons">

    <!-- Cloud -->
    <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M7 18a4 4 0 1 1 .8-7.9A5 5 0 0 1 17 8a4 4 0 1 1 0 8"></path>
        <path d="M12 12v8"></path>
        <path d="M8 16l4 4 4-4"></path>
    </svg>

    <!-- Message -->
    <div class="icon-with-arrow">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
    </div>

    <!-- Help -->
    <div class="icon-with-arrow">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9 9a3 3 0 1 1 6 0c0 2-3 2-3 5"/>
            <circle cx="12" cy="17" r="1"/>
        </svg>
        <span class="arrow">▼</span>
    </div>

    <!-- User -->
    <div class="icon-with-arrow">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M20 21a8 8 0 0 0-16 0"/>
            <circle cx="12" cy="8" r="4"/>
        </svg>
        <span class="arrow">▼</span>
    </div>

</div>
    </header>
    <main class="dashboard-content">
        <div class="top-image">
            <img src="Photo/update.png" alt="Update">
        </div>
        <a href="score.html" class="menu-card">
            <div class="card-content">
                <span class="card-title">Personal Data</span>
            </div>
            <div class="card-icon moodle">
                 <img src="Photo/1.png" alt="">
            </div>
        </a>
        <a href="#" class="menu-card">
            <div class="card-content">
                <span class="card-title">Attend report</span>
            </div>
            <div class="card-icon moodle">
                 <img src="Photo/2.png" alt="">
            </div>
        </a>
        <a href="#" class="menu-card">
            <div class="card-content">
                <span class="card-title">Schedule</span>
            </div>
            <div class="card-icon moodle">
                  <img src="Photo/3.png" alt="">
             </div>
        </a>
        <a href="score.html" class="menu-card">
            <div class="card-content">
                <span class="card-title">Score</span>
            </div>
            <div class="card-icon moodle">
                 <img src="Photo/4.png" alt="">
            </div>
        </a>
        <a href="#" class="menu-card">
            <div class="card-content">
                <span class="card-title">Request</span>
            </div>
            <div class="card-icon moodle">
                 <img src="Photo/5.png" alt="">
            </div>
        </a>
        <a href="#" class="menu-card">
            <div class="card-content">
                <span class="card-title">Exam Time</span>
            </div>
            <div class="card-icon moodle">
                 <img src="Photo/6.png" alt="">
            </div>
        </a>
        <a href="#" class="menu-card">
            <div class="card-content">
                <span class="card-title">library</span>
            </div>
            <div class="card-icon moodle">
                 <img src="Photo/7.png" alt="">
            </div>
        </a>
        <a href="#" class="menu-card">
            <div class="card-content">
                <span class="card-title">moodle</span>
            </div>
            <div class="card-icon moodle">
                 <img src="Photo/8.png" alt="">
            </div>
        </a>
    </main>
    <footer class="dashboard-footer">
        <p>© 2026 University Student Portal. All rights reserved.</p>
    </footer>
</body>
</html>
